<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    .calculator { max-width: 200px; }
    input, select, button { margin: 5px; padding: 8px; }
    #result { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body style="background-color: #f0f0f0;">  <h1>Калькулятор</h1>
  <div class="calculator">
    <input id="num1" type="number" placeholder="Число 1">
    <input id="num2" type="number" placeholder="Число 2">
    <select id="operation">
      <option value="add">+</option>
      <option value="subtract">-</option>
      <option value="multiply">*</option>
      <option value="divide">/</option>
    </select>
    <button id="calculate">Обчислити</button>
    <p id="result"></p>
  </div>
  <script>
    document.getElementById('calculate').addEventListener('click', () => {
      const num1 = parseFloat(document.getElementById('num1').value);
      const num2 = parseFloat(document.getElementById('num2').value);
      const operation = document.getElementById('operation').value;
      let result;
      switch(operation) {
        case 'add': result = num1 + num2; break;
        case 'subtract': result = num1 - num2; break;
        case 'multiply': result = num1 * num2; break;
        case 'divide': result = num2 !== 0 ? num1 / num2 : 'Помилка: ділення на 0';
      }
      document.getElementById('result').innerHTML = `Результат: ${result}`;
    });
  </script>
</body>
</html>
