<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Локальна сторінка</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    form { margin-top: 20px; }
    input { margin: 5px; padding: 8px; }
    button { padding: 8px 16px; background: #007bff; color: white; border: none; cursor: pointer; }
    #successMessage { color: green; margin-top: 10px; }
  </style>
</head>
<body>
<h1 style="color: red; font-size: 48px;">Вітаємо на локальній сторінці!</h1>  <form id="loginForm">
    <input id="username" type="text" placeholder="Ім'я користувача" required />
    <input id="password" type="password" placeholder="Пароль" required />
    <button id="submitButton" type="submit">Увійти</button>
  </form>
  <p id="successMessage" style="display: none;">Успішний вхід!</p>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('successMessage').style.display = 'block';
    });
  </script>
</body>
</html> Змінена локальна сторінка!!!
